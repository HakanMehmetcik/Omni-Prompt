<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OmniPrompt Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; width: 340px; background: #fdfdfd; }
        h3 { margin: 0 0 12px 0; font-size: 16px; color: #333; display: flex; justify-content: space-between; align-items: center; }
        textarea { width: 100%; height: 85px; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; resize: none; font-size: 14px; margin-bottom: 8px; }
        .settings-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .controls { display: flex; justify-content: space-between; align-items: center; }
        select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; background: white; font-size: 13px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        button { color: white; border: none; padding: 11px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s opacity; }
        #injectBtn { background: #007bff; }
        #reviseBtn { background: #28a745; }
        #stopBtn { background: #dc3545; display: none; }
        .checkbox-label { font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        #status { margin-top: 12px; font-size: 12px; text-align: center; color: #888; min-height: 18px; font-style: italic; }
    </style>
</head>
<body>
    <h3>OmniPrompt Pro <span id="mBadge" style="font-size: 10px; color: #007bff;">Local Only</span></h3>
    <textarea id="basicInput" placeholder="Enter basic idea or leave empty for Revise..."></textarea>
    <div class="settings-row">
        <select id="modelSelect"><option>Loading models...</option></select>
        <div class="controls">
            <select id="flavorSelect" style="width: 60%;">
                <option value="technical">Technical</option>
                <option value="academic">Academic</option>
                <option value="creative">Creative</option>
            </select>
            <label class="checkbox-label"><input type="checkbox" id="autoSend"> Auto-Send</label>
        </div>
    </div>
    <div class="btn-group">
        <button id="injectBtn">Compile & Inject</button>
        <button id="reviseBtn">Revise Chatbox</button>
        <button id="stopBtn">Stop AI</button>
    </div>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
