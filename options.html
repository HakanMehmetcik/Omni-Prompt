<!DOCTYPE html>
<html>
<head>
    <title>OmniPrompt Settings</title>
    <style>
        body { font-family: sans-serif; padding: 20px; width: 300px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }

</head>
<body>
    <h3>Settings</h3>
    <label>Ollama Server URL:</label>
    <input type="text" id="url" value="http://127.0.0.1:11434">
    <button id="save">Save</button>
    <script src="options.js"></script>
</body>
</html>
